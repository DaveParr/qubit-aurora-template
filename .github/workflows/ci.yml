name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run host tests
        run: make -C hello-aurora/tests

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install ARM toolchain
        run: |
          sudo apt-get update -y && sudo apt-get install -y gcc-arm-none-eabi
          echo "GCC_PATH=$(dirname $(which arm-none-eabi-gcc))" >> "$GITHUB_ENV"
      - name: Derive version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi
      - name: Build libDaisy
        run: make libdaisy
      - name: Discover and build projects
        run: |
          PROJECTS=$(find . -maxdepth 1 -mindepth 1 -type d \
            | while read dir; do [ -f "$dir/Makefile" ] && echo "${dir#./}"; done \
            | grep -v -E '^(lib|docs|\.)')
          FAILED=0
          for PROJECT in $PROJECTS; do
            make build PROJECT="$PROJECT" \
              FIRMWARE_VERSION="${{ steps.version.outputs.version }}" \
              || { echo "BUILD FAILED: $PROJECT"; FAILED=1; }
          done
          [ $FAILED -eq 0 ]
      - name: Collect artifacts
        run: |
          mkdir -p dist
          find . -path '*/build/*.bin' -exec cp {} dist/ \;
      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: dist/*.bin

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: firmware
          path: dist
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --repo "${{ github.repository }}" \
            --generate-notes \
            dist/*.bin
